<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Marginália — clube de leitura</title>
<!-- LEGADO → REDIRECT. Este arquivo era o app pré-Vite (Babel-no-navegador). O app
     real agora é o bundle Vite na raiz (./?app=1). Alguns ícones de tela inicial do
     iOS ficaram com o start_url preso em ./Marginalia.html (criados antes de o
     manifest ser corrigido) e abriam a versão antiga, SEM Acervo. Esta página leva
     esses ícones ao app novo, mantendo o modo standalone (mesma origem/escopo) e
     preservando ?join=/parâmetros e hash. Ver skill marginalia-projeto.
     O sw.js é network-first → o aparelho preso busca esta versão e cai no app novo. -->
<script>
(function () {
  try {
    var p = new URLSearchParams(window.location.search);
    p.set('app', '1');
    window.location.replace('./?' + p.toString() + (window.location.hash || ''));
  } catch (e) {
    window.location.replace('./?app=1');
  }
})();
</script>
</head>
<body style="margin:0;background:#EFE8DA;color:#2A2620;font-family:-apple-system,system-ui,sans-serif;">
<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;">
  <a href="./?app=1" style="color:#B0533A;text-decoration:none;font-size:15px;">Abrindo a Marginália…</a>
</div>
<noscript><a href="./?app=1">Abrir a Marginália</a></noscript>
</body>
</html>
