<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Marginália">
  <!-- fundo: papel cremoso -->
  <rect width="512" height="512" rx="96" fill="#F4EFE6"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#B0533A" stroke-opacity="0.12" stroke-width="2"/>

  <g transform="translate(256 256)" stroke-linejoin="round" stroke-linecap="round">
    <!-- Livro aberto — duas páginas trapezoidais espelhadas, em terracota profunda -->
    <!-- página esquerda -->
    <path d="M -150 -110 L -10 -90 L -10 110 L -150 90 Z"
          fill="none" stroke="#8E3E2A" stroke-width="10"/>
    <!-- página direita -->
    <path d="M 150 -110 L 10 -90 L 10 110 L 150 90 Z"
          fill="none" stroke="#8E3E2A" stroke-width="10"/>
    <!-- canto dourado esquerdo (encadernação / marcador) -->
    <path d="M -150 -110 L -110 -106 L -150 -70 Z"
          fill="#C48A2C"/>
    <!-- canto dourado direito -->
    <path d="M 150 -110 L 110 -106 L 150 -70 Z"
          fill="#C48A2C"/>
    <!-- canto dourado inferior esquerdo (mais discreto) -->
    <path d="M -150 90 L -130 86 L -150 70 Z"
          fill="#C48A2C" opacity="0.7"/>
    <!-- canto dourado inferior direito -->
    <path d="M 150 90 L 130 86 L 150 70 Z"
          fill="#C48A2C" opacity="0.7"/>

    <!-- M central serifado, em terracota profunda -->
    <text x="0" y="40" font-family="Fraunces, 'Iowan Old Style', Georgia, serif"
          font-size="220" font-weight="500" text-anchor="middle"
          fill="#8E3E2A" letter-spacing="-6">M</text>

    <!-- pequena onda/sublinhado abaixo do M (assinatura "marginália") -->
    <path d="M -50 100 Q -25 90, 0 100 T 50 100"
          fill="none" stroke="#C48A2C" stroke-width="4" opacity="0.85"/>
  </g>
</svg>
